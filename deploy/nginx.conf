server {
    listen 80;
    listen [::]:80;
    server_name alexfrison.net www.alexfrison.net;

    # Redirect HTTP → HTTPS (remove this block if not using SSL)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name alexfrison.net www.alexfrison.net;

    # --- SSL (certbot will fill these in) ---
    ssl_certificate     /etc/letsencrypt/live/alexfrison.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alexfrison.net/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # --- Root ---
    root /var/www/alexfrison.net/dist;
    index index.html;

    # --- Gzip ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml+rss application/atom+xml image/svg+xml;

    # --- Astro static output: try file, then .html, then 404 ---
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # --- Long-lived cache for hashed assets ---
    location ~* \.(js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|webp|gif|ico|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --- Custom 404 ---
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # --- Security headers ---
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
}
